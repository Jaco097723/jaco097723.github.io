<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>極光之旅 - 團隊請假看板</title>
    
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

    <style>
        :root { --primary: #6366f1; --bg: #f8fafc; }
        body { font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; display: flex; margin: 0; background: var(--bg); height: 100vh; overflow: hidden; }
        
        /* 側邊欄樣式 */
        #sidebar { width: 260px; background: white; padding: 25px; border-right: 1px solid #e2e8f0; display: flex; flex-direction: column; box-shadow: 2px 0 10px rgba(0,0,0,0.02); }
        .status-tag { font-size: 12px; color: #10b981; background: #dcfce7; padding: 6px 12px; border-radius: 20px; text-align: center; margin-bottom: 20px; font-weight: bold; }
        
        h4 { margin: 15px 0 10px; color: #334155; font-size: 15px; border-bottom: 2px solid #f1f5f9; padding-bottom: 8px; }
        .fc-event { margin: 8px 0; padding: 12px; cursor: grab; border-radius: 8px; color: white; text-align: center; font-weight: bold; border: none; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); transition: transform 0.1s; font-size: 14px; }
        .fc-event:active { transform: scale(0.95); }
        
        /* 月曆區樣式 */
        #calendar-container { flex-grow: 1; padding: 25px; overflow-y: auto; }
        #calendar { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); border: 1px solid #f1f5f9; }
        
        /* 🌌 極光密碼遮罩 (關鍵修正：載入同目錄下的圖片) */
        #auth-overlay { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background-color: #000; /* 預設黑色底色 */
            
            /* 【核心修正】這裡直接指向同目錄下的圖片檔名 */
            background-image: url('aurora.png'); 
            
            background-size: cover;       /* 自動縮放填滿幕 */
            background-position: center;  /* 圖片對齊中心 */
            background-repeat: no-repeat;
            
            z-index: 9999; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            color: white; 
            flex-direction: column;
        }

        /* 標題與文字效果 */
        #auth-overlay h2 { 
            font-size: 48px; font-weight: 800; letter-spacing: 8px; margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(0,255,255,0.6), 0 0 40px rgba(0,0,0,0.8);
        }

        /* 玻璃感輸入框 */
        #pwd-input { 
            padding: 15px; border-radius: 50px; 
            border: 1px solid rgba(255, 255, 255, 0.4);
            width: 280px; text-align: center; font-size: 20px; margin-top: 20px; 
            outline: none; background: rgba(255, 255, 255, 0.15); color: white;
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }
        #pwd-input::placeholder { color: rgba(255, 255, 255, 0.6); }
    </style>
</head>
<body>

<div id="auth-overlay">
    <h2>🌌 極光之旅</h2>
    <input type="password" id="pwd-input" placeholder="請輸入存取密碼" onkeypress="checkEnter(event)">
</div>

<div id="sidebar">
    <div class="status-tag">● 雲端同步中</div>
    
    <h4>👤 成員名單</h4>
    <div class='fc-event' style="background:#3b82f6" data-event='{"title": "Castillo-請假", "color": "#3b82f6"}'>Castillo</div>
    <div class='fc-event' style="background:#10b981" data-event='{"title": "Chris-請假", "color": "#10b981"}'>Chris</div>
    <div class='fc-event' style="background:#f59e0b" data-event='{"title": "Alex-請假", "color": "#f59e0b"}'>Alex</div>
    <div class='fc-event' style="background:#ef4444" data-event='{"title": "PJ-請假", "color": "#ef4444"}'>PJ</div>
    <div class='fc-event' style="background:#8b5cf6" data-event='{"title": "YC-請假", "color": "#8b5cf6"}'>YC</div>
    <div class='fc-event' style="background:#06b6d4" data-event='{"title": "James-請假", "color": "#06b6d4"}'>James</div>

    <div style="margin-top: auto; font-size: 12px; color: #64748b; line-height: 1.6; background: #f8fafc; padding: 10px; border-radius: 6px;">
        💡 <b>操作指南：</b><br>
        • 將色塊拉進日期即新增。<br>
        • 點擊標籤即可刪除紀錄。<br>
        • 拖動標籤邊緣增減天數。
    </div>
</div>

<div id="calendar-container">
    <div id="calendar"></div>
</div>

<script>
    // --- 1. 密碼驗證 ---
    function checkEnter(e) {
        if (e.key === 'Enter') {
            const input = document.getElementById('pwd-input').value;
            // 預設密碼仍為你所設定的
            if (input === "2026##") { 
                document.getElementById('auth-overlay').style.display = 'none';
            } else {
                alert("密碼不正確，請重新輸入！");
                document.getElementById('pwd-input').value = "";
            }
        }
    }

    // --- 2. Firebase 初始化 (填入你的配置) ---
    const firebaseConfig = {
        apiKey: "AIzaSyCepC55CSnUYH7kL0YPqMu3i-bG76IOMXo",
        authDomain: "staff-7951e.firebaseapp.com",
        databaseURL: "https://staff-7951e-default-rtdb.firebaseio.com",
        projectId: "staff-7951e",
        storageBucket: "staff-7951e.firebasestorage.app",
        messagingSenderId: "372090977076",
        appId: "1:372090977076:web:ba7a04005db12942e90361"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database().ref('leave_records');

    // --- 3. 月曆初始化 ---
    document.addEventListener('DOMContentLoaded', function() {
        const calendarEl = document.getElementById('calendar');
        
        new FullCalendar.Draggable(document.getElementById('sidebar'), {
            itemSelector: '.fc-event',
            eventData: function(eventEl) {
                const data = JSON.parse(eventEl.getAttribute('data-event'));
                return { title: data.title, backgroundColor: data.color, borderColor: data.color };
            }
        });

        const calendar = new FullCalendar.Calendar(calendarEl, {
            initialView: 'dayGridMonth',
            locale: 'zh-tw',
            editable: true,
            droppable: true,
            headerToolbar: { left: 'prev,next today', center: 'title', right: 'dayGridMonth' },

            // 新增事件至 Firebase
            eventReceive: function(info) {
                const newId = "ID_" + Date.now();
                db.child(newId).set({
                    id: newId,
                    title: info.event.title,
                    start: info.event.startStr,
                    end: info.event.endStr || info.event.startStr,
                    color: info.event.backgroundColor
                });
                info.event.remove(); 
            },

            // 更新事件
            eventDrop: updateEvent,
            eventResize: updateEvent,

            // 刪除事件
            eventClick: function(info) {
                if (confirm(`確定刪除「${info.event.title}」？`)) {
                    db.child(info.event.id).remove();
                }
            }
        });

        calendar.render();

        // 監聽雲端數據
        db.on('value', (snapshot) => {
            const data = snapshot.val();
            calendar.removeAllEvents();
            if (data) {
                Object.values(data).forEach(evt => {
                    calendar.addEvent({
                        id: evt.id,
                        title: evt.title,
                        start: evt.start,
                        end: evt.end,
                        backgroundColor: evt.color,
                        borderColor: evt.color
                    });
                });
            }
        });

        function updateEvent(info) {
            db.child(info.event.id).update({
                start: info.event.startStr,
                end: info.event.endStr || info.event.startStr
            });
        }
    });
</script>
</body>
</html>
