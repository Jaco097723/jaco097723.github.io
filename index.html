<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>團隊請假雲端看板</title>
    
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

    <style>
        :root { --primary: #6366f1; --bg: #f8fafc; }
        body { font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; display: flex; margin: 0; background: var(--bg); height: 100vh; }
        
        /* 側邊欄樣式 */
        #sidebar { width: 260px; background: white; padding: 25px; border-right: 1px solid #e2e8f0; display: flex; flex-direction: column; box-shadow: 2px 0 10px rgba(0,0,0,0.02); }
        .status-tag { font-size: 12px; color: #10b981; background: #dcfce7; padding: 6px 12px; border-radius: 20px; text-align: center; margin-bottom: 20px; font-weight: bold; }
        
        h4 { margin: 15px 0 10px; color: #334155; font-size: 15px; border-bottom: 2px solid #f1f5f9; padding-bottom: 8px; }
        .fc-event { margin: 10px 0; padding: 14px; cursor: grab; border-radius: 8px; color: white; text-align: center; font-weight: bold; border: none; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); transition: transform 0.1s; }
        .fc-event:active { transform: scale(0.95); }
        
        /* 月曆區樣式 */
        #calendar-container { flex-grow: 1; padding: 25px; overflow-y: auto; }
        #calendar { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); border: 1px solid #f1f5f9; }
        
        /* 密碼遮罩 */
        #auth-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #1e293b; z-index: 9999; display: flex; justify-content: center; align-items: center; color: white; flex-direction: column; }
        #auth-overlay input { padding: 12px; border-radius: 6px; border: none; width: 200px; text-align: center; font-size: 18px; margin-top: 15px; }
    </style>
</head>
<body>

<div id="auth-overlay">
    <h2>🔒 請輸入團隊存取密碼</h2>
    <input type="password" id="pwd-input" placeholder="Enter Password" onkeypress="checkEnter(event)">
    <p style="font-size: 12px; color: #94a3b8; margin-top: 10px;">(預設密碼為 2026)</p>
</div>

<div id="sidebar">
    <div class="status-tag">● 雲端同步已啟動</div>
    
    <h4>👤 成員名單 (拖拽)</h4>
    <div class='fc-event' style="background:#3b82f6" data-event='{"title": "小名", "color": "#3b82f6"}'>小名</div>
    <div class='fc-event' style="background:#10b981" data-event='{"title": "小裕", "color": "#10b981"}'>小裕</div>
    <div class='fc-event' style="background:#f59e0b" data-event='{"title": "小陳", "color": "#f59e0b"}'>小陳</div>

    <div style="margin-top: auto; font-size: 12px; color: #64748b; line-height: 1.6; background: #f8fafc; padding: 10px; border-radius: 6px;">
        💡 <b>操作指南：</b><br>
        • 拖動色塊至日期新增紀錄。<br>
        • 點擊月曆上的標籤即可<b>刪除</b>。<br>
        • 拖動標籤邊緣可增減天數。
    </div>
</div>

<div id="calendar-container">
    <div id="calendar"></div>
</div>

<script>
    // --- 1. 密碼驗證邏輯 ---
    function checkEnter(e) {
        if (e.key === 'Enter') {
            const input = document.getElementById('pwd-input').value;
            if (input === "2026") { // ⬅️ 你可以在此修改密碼
                document.getElementById('auth-overlay').style.display = 'none';
            } else {
                alert("密碼錯誤！");
                document.getElementById('pwd-input').value = "";
            }
        }
    }

    // --- 2. Firebase 初始化 (已填入你的配置) ---
    const firebaseConfig = {
        apiKey: "AIzaSyCepC55CSnUYH7kL0YPqMu3i-bG76IOMXo",
        authDomain: "staff-7951e.firebaseapp.com",
        databaseURL: "https://staff-7951e-default-rtdb.firebaseio.com",
        projectId: "staff-7951e",
        storageBucket: "staff-7951e.firebasestorage.app",
        messagingSenderId: "372090977076",
        appId: "1:372090977076:web:ba7a04005db12942e90361"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database().ref('leave_records');

    // --- 3. 月曆與拖拽邏輯 ---
    document.addEventListener('DOMContentLoaded', function() {
        const calendarEl = document.getElementById('calendar');
        
        // 初始化側邊欄拖拽
        new FullCalendar.Draggable(document.getElementById('sidebar'), {
            itemSelector: '.fc-event',
            eventData: function(eventEl) {
                const data = JSON.parse(eventEl.getAttribute('data-event'));
                return { title: data.title, backgroundColor: data.color, borderColor: data.color };
            }
        });

        const calendar = new FullCalendar.Calendar(calendarEl, {
            initialView: 'dayGridMonth',
            locale: 'zh-tw',
            editable: true,
            droppable: true,
            headerToolbar: { left: 'prev,next today', center: 'title', right: 'dayGridMonth' },

            // 新增事件至 Firebase
            eventReceive: function(info) {
                const newId = "ID_" + Date.now();
                db.child(newId).set({
                    id: newId,
                    title: info.event.title,
                    start: info.event.startStr,
                    end: info.event.endStr || info.event.startStr,
                    color: info.event.backgroundColor
                });
                info.event.remove(); // 等待 Firebase 同步更新
            },

            // 更新事件 (移動/縮放)
            eventDrop: updateEvent,
            eventResize: updateEvent,

            // 刪除事件
            eventClick: function(info) {
                if (confirm(`確定要取消「${info.event.title}」？`)) {
                    db.child(info.event.id).remove();
                }
            }
        });

        calendar.render();

        // 監聽雲端數據
        db.on('value', (snapshot) => {
            const data = snapshot.val();
            calendar.removeAllEvents();
            if (data) {
                Object.values(data).forEach(evt => {
                    calendar.addEvent({
                        id: evt.id,
                        title: evt.title,
                        start: evt.start,
                        end: evt.end,
                        backgroundColor: evt.color,
                        borderColor: evt.color
                    });
                });
            }
        });

        function updateEvent(info) {
            db.child(info.event.id).update({
                start: info.event.startStr,
                end: info.event.endStr || info.event.startStr
            });
        }
    });
</script>

</body>
</html>
